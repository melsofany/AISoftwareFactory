services:
  - type: web
    name: ai-software-factory
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-factory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: "ai-software-factory"
      - key: OAUTH_SERVER_URL
        value: "https://auth.manus.im"
      - key: OWNER_OPEN_ID
        value: "" # سيتم ملؤه لاحقاً أو تركه للمستخدم
      - key: BUILT_IN_FORGE_API_URL
        value: "https://api.manus.im"
      - key: BUILT_IN_FORGE_API_KEY
        sync: false

databases:
  - name: ai-factory-db
    databaseName: ai_factory_db
    user: ai_user
    region: oregon
    plan: free
